<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>데이터 이전 도구 (1회용)</title>
<style>
 body{font-family:'Noto Sans KR',sans-serif;max-width:600px;margin:40px auto;padding:0 20px;line-height:1.6;color:#5d5446;}
 button{padding:14px 24px;font-size:1rem;background:#d4c4a8;color:#fff;border:none;border-radius:8px;cursor:pointer;}
 button:disabled{opacity:.5;cursor:not-allowed;}
 #log{margin-top:20px;white-space:pre-wrap;background:#f7f3ed;padding:15px;border-radius:8px;font-size:.9rem;min-height:40px;}
 .warn{background:#fff3ee;border:1px solid #e2a095;padding:12px 15px;border-radius:8px;font-size:0.9rem;}
</style>
</head>
<body>
<h2>🔄 스프레드시트 → Firebase 데이터 이전</h2>
<p class="warn">⚠️ 이 버튼은 <b>딱 한 번만</b> 눌러주세요. 이미 옮긴 뒤에 또 누르면 데이터가 중복으로 쌓일 수 있어요.<br>
이전이 끝나면 이 파일(migrate.html)은 지우셔도 됩니다.</p>
<button id="btn" onclick="migrate()">지금 데이터 옮기기</button>
<div id="log"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
// 기존에 쓰던 Google Apps Script 주소 (script.js에 있던 것과 동일)
const OLD_API_URL = "https://script.google.com/macros/s/AKfycbwx85nG9guPvcQzKPyxAaIgOf3IxJHGeaxU3b8m4nARtrZyD7miRECJb9Rl-08yaLt-/exec";

function log(msg) {
    document.getElementById('log').innerText += msg + '\n';
}

async function migrate() {
    document.getElementById('btn').disabled = true;
    document.getElementById('log').innerText = '';
    try {
        log('회원 정보를 가져오는 중...');
        const users = await (await fetch(`${OLD_API_URL}?action=getUsers`)).json();
        for (const u of users) {
            await db.collection('users').doc(u.nickname).set({
                password: u.password, cart: u.cart || {}, confirmed: !!u.confirmed
            });
        }
        log(`✅ 회원 ${users.length}명 이전 완료`);

        log('상품 목록을 가져오는 중...');
        const products = await (await fetch(`${OLD_API_URL}?action=getProducts`)).json();
        const batch1 = db.batch();
        products.forEach(p => {
            batch1.set(db.collection('products').doc(String(p.id)), {
                category: p.category, name: p.name, brand: p.brand, price: p.price
            });
        });
        await batch1.commit();
        log(`✅ 상품 ${products.length}개 이전 완료`);

        log('건의게시판 글을 가져오는 중...');
        const posts = await (await fetch(`${OLD_API_URL}?action=getPosts`)).json();
        for (const p of posts) {
            await db.collection('posts').doc(String(p.id)).set({
                title: p.title, body: p.body, author: p.author,
                created_at: p.created_at, edited: !!p.edited
            });
            const comments = await (await fetch(`${OLD_API_URL}?action=getComments&postId=${p.id}`)).json();
            if (comments.length > 0) {
                const batch2 = db.batch();
                comments.forEach(c => {
                    batch2.set(db.collection('comments').doc(String(c.id)), {
                        post_id: Number(p.id),
                        parent_id: c.parent_id ? Number(c.parent_id) : null,
                        author: c.author, body: c.body, created_at: c.created_at
                    });
                });
                await batch2.commit();
            }
        }
        log(`✅ 게시글 ${posts.length}개 및 댓글 이전 완료`);

        log('\n🎉 모든 데이터 이전이 끝났습니다!\n이제 앱(index.html)에 들어가서 잘 되는지 확인해보시고,\n확인 후에는 이 migrate.html 파일을 삭제하셔도 됩니다.');
    } catch (err) {
        log('❌ 오류가 발생했습니다: ' + err.message + '\n\n인터넷 연결을 확인하시거나, firebase-config.js 설정이 올바른지 확인해주세요.');
    }
    document.getElementById('btn').disabled = false;
}
</script>
</body>
</html>
